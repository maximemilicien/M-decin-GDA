<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDC — Accès Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg-void: #0a0d12;
    --bg-panel: #12161d;
    --bg-panel-raised: #171c25;
    --line: #232935;
    --line-bright: #333c4d;
    --red: #c23b3b;
    --red-glow: #e0524f;
    --green: #4a9d6f;
    --text-primary: #e8ebf0;
    --text-dim: #7a8494;
    --text-faint: #4a5262;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    position: relative;

    /* Fond d'écran MDC */
    background-image: url("image/fond d'écrant mdc.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
  }

  /* Ambient grid backdrop */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.15;
    mask-image: radial-gradient(ellipse 60% 50% at 50% 40%, black, transparent);
    pointer-events: none;
  }

  .side-img {
    position: fixed;
    top: 0;
    bottom: 0;
    width: 26vw;
    max-width: 420px;
    background-size: cover;
    background-position: center;
    z-index: 0;
    pointer-events: none;
  }
  .side-img.left {
    left: 0;
    background-image: url("image/agent-gda-1.png");
    mask-image: linear-gradient(90deg, black 40%, transparent 100%);
    -webkit-mask-image: linear-gradient(90deg, black 40%, transparent 100%);
  }
  .side-img.right {
    right: 0;
    background-image: url("image/agent-gda-2.png");
    mask-image: linear-gradient(270deg, black 40%, transparent 100%);
    -webkit-mask-image: linear-gradient(270deg, black 40%, transparent 100%);
  }

  .console {
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 1;
    transition: max-width 0.4s ease;
  }
  .console.expanded {
    max-width: 1400px;
  }

  /* Header */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 28px;
    text-align: center;
  }

  .crest {
    width: 180px;
    height: 180px;
    flex-shrink: 0;
    position: relative;
    perspective: 400px;
    margin-bottom: 14px;
  }
  .crest::before {
    content: '';
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(224, 82, 79, 0.35) 0%, transparent 70%);
    filter: blur(6px);
    z-index: 0;
  }
  .crest img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    animation: spinY 6s linear infinite;
    transform-style: preserve-3d;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 18px rgba(224, 82, 79, 0.5));
  }
  @keyframes spinY {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
  }

  .header-text .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.18em;
    color: var(--red-glow);
    text-transform: uppercase;
    font-weight: 700;
  }
  .header-text h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-top: 4px;
  }

  /* Panel */
  .panel {
    background: transparent;
    border: none;
    border-radius: 4px;
    overflow: hidden;
    backdrop-filter: none;
  }

  .panel-strip {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    opacity: 0.6;
  }

  .panel-body { padding: 32px 28px; }

  .field-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: block;
    margin-bottom: 10px;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  .input-scan {
    position: relative;
    flex: 1;
  }

  #matricule, #mdpVerif {
    width: 100%;
    background: var(--bg-void);
    border: 1px solid var(--line-bright);
    border-radius: 3px;
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  #matricule::placeholder, #mdpVerif::placeholder { color: var(--text-faint); letter-spacing: normal; font-weight: 400; }
  #matricule:focus, #mdpVerif:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(194, 59, 59, 0.12);
  }

  .btn-verify {
    background: var(--bg-panel-raised);
    border: 1px solid var(--line-bright);
    border-radius: 3px;
    padding: 0 20px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .btn-verify:hover:not(:disabled) { border-color: var(--red); color: var(--red-glow); }
  .btn-verify:active:not(:disabled) { transform: scale(0.97); }
  .btn-verify:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Status area */
  .big-status {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 18px 0 4px;
    opacity: 0;
    transform: scale(0.9);
    animation: bigStatusIn 0.4s ease forwards;
  }
  .big-status.ok { color: var(--green); text-shadow: 0 0 24px rgba(74, 157, 111, 0.6); }
  .big-status.fail { color: var(--red-glow); text-shadow: 0 0 24px rgba(224, 82, 79, 0.6); }
  @keyframes bigStatusIn { to { opacity: 1; transform: scale(1); } }

  .status-zone {
    margin-top: 20px;
    min-height: 0;
    overflow: hidden;
    transition: min-height 0.35s ease;
  }
  .status-zone.active { min-height: 64px; }

  .status-line {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 12px 14px;
    border-radius: 3px;
    border: 1px solid var(--line);
    background: var(--bg-void);
    opacity: 0;
    transform: translateY(-4px);
    animation: statusIn 0.3s ease forwards;
  }
  @keyframes statusIn { to { opacity: 1; transform: translateY(0); } }

  .status-line.scanning { color: var(--text-dim); }
  .status-line.ok { color: var(--green); border-color: rgba(74, 157, 111, 0.35); }
  .status-line.fail { color: var(--red-glow); border-color: rgba(194, 59, 59, 0.35); }

  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot.scanning { background: var(--text-dim); animation: pulse 1s ease-in-out infinite; }
  .dot.ok { background: var(--green); }
  .dot.fail { background: var(--red-glow); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .scan-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
  }
  .scan-percent {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    min-width: 34px;
    text-align: right;
    flex-shrink: 0;
  }
  .scan-bar {
    flex: 1;
    height: 2px;
    background: var(--bg-void);
    border-radius: 2px;
    overflow: hidden;
  }
  .scan-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--red-glow);
    border-radius: 2px;
  }
  /* Le remplissage de la barre est piloté en JS pour rester synchronisé avec le %. */

  /* Result / action zone */
  .action-zone {
    margin-top: 18px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
  .action-zone.open { max-height: 900px; }

  .id-card {
    background: var(--bg-panel-raised);
    border: 1px solid rgba(74, 157, 111, 0.3);
    border-radius: 3px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    opacity: 0;
    transform: translateY(6px);
  }
  .action-zone.open .id-card { animation: statusIn 0.4s ease 0.1s forwards; }

  .id-card-info .id-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .id-card-info .id-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .btn-access {
    background: var(--green);
    color: #0a0d12;
    border: none;
    border-radius: 3px;
    padding: 11px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    flex-shrink: 0;
    transition: filter 0.15s ease, transform 0.1s ease;
  }
  .btn-access:hover { filter: brightness(1.12); }
  .btn-access:active { transform: scale(0.96); }

  .btn-site-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    background: var(--green);
    color: #0a0d12;
    text-decoration: none;
    border-radius: 3px;
    padding: 14px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: filter 0.15s ease, transform 0.1s ease;
  }
  .btn-site-link:hover { filter: brightness(1.12); }
  .btn-site-link:active { transform: scale(0.97); }

  .docs-panel {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px dashed var(--line-bright);
  }
  .docs-panel .docs-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .doc-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    background: var(--bg-panel-raised);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 10px 14px;
    margin-bottom: 8px;
    color: var(--text-primary);
    text-decoration: none;
    font-size: 13px;
    transition: border-color 0.15s ease;
  }
  .doc-link:hover { border-color: var(--red); color: var(--red-glow); }
  .doc-link .arrow { color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

  .menu-boutons {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 60px 40px;
    max-width: 480px;
    margin: 0 auto;
  }
  .btn-lien-mdc {
    background: var(--bg-panel-raised);
    border: 1px solid var(--line-bright);
    border-radius: 4px;
    padding: 22px 24px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn-lien-mdc:hover { border-color: var(--red); color: var(--red-glow); box-shadow: 0 0 0 3px rgba(194, 59, 59, 0.12); }
  .btn-lien-mdc:active { transform: scale(0.98); }

  .btn-retour {
    display: inline-block;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    margin-bottom: 12px;
    padding: 6px 0;
  }
  .btn-retour:hover { color: var(--red-glow); }

  .iframe-wrap {
    width: 100%;
    height: 88vh;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--line-bright);
  }
  .iframe-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .footer-note {
    margin-top: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    text-align: center;
    letter-spacing: 0.04em;
  }
  .badge-corner {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10;
    background: rgba(18, 22, 29, 0.92);
    border: 1px solid var(--line-bright);
    border-radius: 4px;
    padding: 12px 16px;
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 18px rgba(0,0,0,0.4);
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }
  .badge-corner.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .badge-line {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    white-space: nowrap;
  }
  .badge-line + .badge-line { margin-top: 4px; }
  .badge-line .badge-label {
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .badge-line .badge-value {
    color: var(--text-primary);
    font-weight: 700;
  }


</style>
</head>
<body>

<div class="badge-corner" id="badgeCorner">
  <div class="badge-line"><span class="badge-label">Matricule</span><span class="badge-value" id="badgeMatricule">—</span></div>
  <div class="badge-line"><span class="badge-label">Grade MDC</span><span class="badge-value" id="badgeGrade">—</span></div>
</div>

<div class="side-img left"></div>
<div class="side-img right"></div>

<div class="console">
  <div class="header">
    <div class="crest">
      <img src="image/MDC GDA.png" alt="Blason M.D.C / G.D.A">
    </div>
    <div class="header-text">
      <div class="eyebrow">M.D.C — Département Médical</div>
      <h1>Dashboard Médecin GDA</h1>
    </div>
  </div>

  <div class="panel">
    <div class="panel-strip"></div>
    <div class="panel-body">
      <div class="input-row" id="inputRow">
        <div class="input-scan">
          <input type="text" id="matricule" placeholder="Matricule" autocomplete="off" spellcheck="false">
        </div>
        <button class="btn-verify" id="verifyBtn">Vérifier</button>
      </div>

      <div class="input-row" id="mdpRow" style="display:none; margin-top:14px;">
        <div class="input-scan">
          <input type="password" id="mdpVerif" placeholder="Mot de passe de vérification" autocomplete="off" spellcheck="false">
        </div>
        <button class="btn-verify" id="mdpVerifyBtn">Confirmer</button>
      </div>

      <div class="scan-bar-wrap" id="scanBar" style="display:none;">
        <div class="scan-bar">
          <div class="scan-bar-fill" id="scanBarFill"></div>
        </div>
        <span class="scan-percent" id="scanPercent">0%</span>
      </div>

      <div class="status-zone" id="statusZone"></div>
      <div id="bigStatus"></div>
      <div class="action-zone" id="actionZone"></div>
    </div>
  </div>

  <div class="footer-note">Accès réservé au personnel médical enregistré</div>
</div>

<script>
  // === Source des matricules : Google Sheet en direct ===
  const SHEET_ID = '1dzJuItFv1XKjbhuyz-qkrWLdWkA-T1aY2vDWmCw36Ew';
  const SHEET_NOM_ONGLET = 'Feuille 1';
  const SHEET_JSON_URL = `https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_NOM_ONGLET)}`;

  // === Source des mots de passe (double vérification) : onglet "parametre" ===
  const SHEET_ONGLET_PARAMETRE = 'parametre';
  const SHEET_JSON_URL_PARAMETRE = `https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_ONGLET_PARAMETRE)}`;

  // === Documents supplémentaires par matricule (double vérification requise) ===
  // Ajoute ou modifie les entrées ci-dessous : clé = matricule en minuscule.
  // Chaque matricule listé ici devra confirmer son mot de passe avant d'accéder au site ET verra ces documents.
  // === Matricules nécessitant la double vérification par mot de passe ===
  // Ajoute/retire des noms ici (en minuscule) pour activer la double vérification
  // UNIQUEMENT pour ces personnes. Les autres passeront sans cette étape,
  // même si un mot de passe existe pour eux dans la feuille "parametre".
  const MATRICULES_DOUBLE_VERIF = ['foxtrot', 'beta', 'milo', 'echo'];

  const DOCUMENTS_SPECIAUX = {
    'milo': [
      { label: 'Registre confidentiel MDC', url: 'https://example.com/registre-confidentiel' }
    ],
    'walkyrie': [
      { label: 'Registre confidentiel MDC', url: 'https://example.com/registre-confidentiel' }
    ],
    'misfit': [
      { label: 'Protocole médical avancé', url: 'https://example.com/protocole-avance' }
    ],
    'marslu': [
      { label: 'Protocole médical avancé', url: 'https://example.com/protocole-avance' }
    ],
    'yesod': [
      { label: 'Protocole médical avancé', url: 'https://example.com/protocole-avance' }
    ]
  };

  async function chargerMatriculesDepuisSheet() {
    const reponse = await fetch(SHEET_JSON_URL);
    if (!reponse.ok) throw new Error(`Statut HTTP ${reponse.status} pour l'onglet "${SHEET_NOM_ONGLET}"`);
    const lignes = await reponse.json();
    // Retourne une Map : nom (en minuscule) -> grade
    const map = new Map();
    lignes.forEach(ligne => {
      const nom = (ligne['Matricule'] || '').trim();
      const grade = (ligne['Grade'] || '').trim();
      if (nom.length > 0) {
        map.set(nom.toLowerCase(), grade);
      }
    });
    return map;
  }

  async function chargerMotsDePasseDepuisSheet() {
    try {
      const reponse = await fetch(SHEET_JSON_URL_PARAMETRE);
      if (!reponse.ok) throw new Error('Impossible de lire la feuille des mots de passe.');
      const lignes = await reponse.json();
      // Retourne une Map : nom (en minuscule) -> mot de passe
      const map = new Map();
      lignes.forEach(ligne => {
        const nom = (ligne['Attribué à'] || '').trim();
        const motDePasse = (ligne['Mot de passe'] || '').trim();
        if (nom.length > 0 && motDePasse.length > 0) {
          map.set(nom.toLowerCase(), motDePasse);
        }
      });
      return map;
    } catch (e) {
      // Si la feuille des mots de passe est injoignable, on ne bloque pas la
      // vérification principale : la double vérification sera simplement ignorée.
      console.warn('Mots de passe indisponibles :', e);
      return new Map();
    }
  }

  const input = document.getElementById('matricule');
  const verifyBtn = document.getElementById('verifyBtn');
  const inputRow = document.getElementById('inputRow');
  const mdpRow = document.getElementById('mdpRow');
  const mdpInput = document.getElementById('mdpVerif');
  const mdpVerifyBtn = document.getElementById('mdpVerifyBtn');
  const badgeCorner = document.getElementById('badgeCorner');
  const badgeMatricule = document.getElementById('badgeMatricule');
  const badgeGrade = document.getElementById('badgeGrade');

  const statusZone = document.getElementById('statusZone');
  const bigStatus = document.getElementById('bigStatus');
  const actionZone = document.getElementById('actionZone');
  const scanBar = document.getElementById('scanBar');
  const scanBarFill = document.getElementById('scanBarFill');
  const scanPercent = document.getElementById('scanPercent');
  const LIEN_SITE_MDC_GDA = 'https://view.genially.com/6a5210a65b24bb639cb4f4e5';

  let contexteEnAttente = null; // { valeur, mdpAttendu, grade }
  let intervalleScan = null;

  function demarrerBarreScan(dureeMs, pctDepart, pctFin) {
    const debutScan = Date.now();
    const depart = pctDepart != null ? pctDepart : 0;
    const fin = pctFin != null ? pctFin : 100;
    scanBarFill.style.width = depart + '%';
    scanPercent.textContent = depart + '%';
    intervalleScan = setInterval(() => {
      const ratio = Math.min(1, (Date.now() - debutScan) / dureeMs);
      const pct = Math.round(depart + (fin - depart) * ratio);
      scanBarFill.style.width = pct + '%';
      scanPercent.textContent = pct + '%';
      if (ratio >= 1) clearInterval(intervalleScan);
    }, 100);
  }

  function arreterBarreScan() {
    if (intervalleScan) clearInterval(intervalleScan);
    intervalleScan = null;
  }

  function setStatus(state, message) {
    statusZone.classList.add('active');
    statusZone.innerHTML = `
      <div class="status-line ${state}">
        <span class="dot ${state}"></span>
        <span>${message}</span>
      </div>
    `;
  }

  function setBigStatus(state, label) {
    bigStatus.innerHTML = `<div class="big-status ${state}">${label}</div>`;
  }

  function clearAll() {
    statusZone.classList.remove('active');
    statusZone.innerHTML = '';
    bigStatus.innerHTML = '';
    actionZone.classList.remove('open');
    actionZone.innerHTML = '';
    arreterBarreScan();
    scanBar.style.display = 'none';
    scanBarFill.style.width = '0%';
    scanPercent.textContent = '0%';
    mdpRow.style.display = 'none';
    mdpInput.value = '';
    contexteEnAttente = null;
  }

  // === Menu de boutons (au lieu du site direct) pour certains matricules ===
  const MATRICULES_MENU_BOUTONS = ['milo', 'foxtrot', 'beta', 'echo'];
  const BOUTONS_MDC_GDA = [
    { label: 'Effectif MDC GDA', url: 'https://docs.google.com/spreadsheets/d/1dzJuItFv1XKjbhuyz-qkrWLdWkA-T1aY2vDWmCw36Ew/edit?gid=1163744246#gid=1163744246' },
    { label: 'Rapport MDC GDA', url: 'https://docs.google.com/forms/d/1fdgjtd7NQi-mv3egwfSOQeXvNa5cc1zQmtQN26QP8ec/edit' },
    { label: 'Documentation GDA', url: 'https://app.genially.com/editor/6a5210a65b24bb639cb4f4e5' }
  ];

  let contexteAccesActuel = null; // { valeur, grade } du dernier accès accordé

  function ouvrirLienMDC(index) {
    const bouton = BOUTONS_MDC_GDA[index];
    if (!bouton) return;
    actionZone.querySelector('.zone-principale').innerHTML = `
      <button class="btn-retour" onclick="revenirAuMenu()">← Retour au menu</button>
      <div class="iframe-wrap">
        <iframe src="${bouton.url}" allow="fullscreen" allowfullscreen></iframe>
      </div>
    `;
  }

  function revenirAuMenu() {
    if (!contexteAccesActuel) return;
    actionZone.querySelector('.zone-principale').innerHTML = construireMenuBoutons();
  }

  function construireMenuBoutons() {
    return `
      <div class="menu-boutons">
        ${BOUTONS_MDC_GDA.map((b, i) => `<button class="btn-lien-mdc" onclick="ouvrirLienMDC(${i})">${b.label}</button>`).join('')}
      </div>
    `;
  }

  function accorderAcces(valeur, grade) {
    document.querySelector('.console').classList.add('expanded');
    contexteAccesActuel = { valeur, grade };
    const docs = DOCUMENTS_SPECIAUX[valeur.toLowerCase()];
    const docsHtml = docs && docs.length
      ? `
        <div class="docs-panel">
          <div class="docs-title">Documents complémentaires</div>
          ${docs.map(d => `
            <a class="doc-link" href="${d.url}" target="_blank" rel="noopener">
              <span>${d.label}</span>
              <span class="arrow">→</span>
            </a>
          `).join('')}
        </div>
      `
      : '';

    const zonePrincipaleHtml = MATRICULES_MENU_BOUTONS.includes(valeur.toLowerCase())
      ? construireMenuBoutons()
      : `
        <div class="iframe-wrap">
          <iframe src="${LIEN_SITE_MDC_GDA}" allow="fullscreen" allowfullscreen></iframe>
        </div>
      `;

    actionZone.innerHTML = `
      <div class="zone-principale">${zonePrincipaleHtml}</div>
      ${docsHtml}
    `;
    actionZone.classList.add('open');

    badgeMatricule.textContent = valeur;
    badgeGrade.textContent = grade || '—';
    badgeCorner.classList.add('visible');
  }

  const DUREE_TOTALE = 5000;
  const DUREE_PHASE = DUREE_TOTALE / 2; // 2500ms : 0→50%, puis 50%→100%

  function continuerPhase2(valeur, grade) {
    scanBar.style.display = 'flex';
    demarrerBarreScan(DUREE_PHASE, 50, 100);
    setStatus('scanning', 'Finalisation de l\'accès…');
    setTimeout(() => {
      arreterBarreScan();
      scanBar.style.display = 'none';
      statusZone.classList.remove('active');
      statusZone.innerHTML = '';
      bigStatus.innerHTML = '';
      accorderAcces(valeur, grade);
    }, DUREE_PHASE);
  }

  function verifier() {
    const valeur = input.value.trim();
    clearAll();

    if (!valeur) {
      setStatus('fail', 'Entrez un matricule avant de vérifier.');
      return;
    }

    verifyBtn.disabled = true;
    scanBar.style.display = 'flex';
    demarrerBarreScan(DUREE_PHASE, 0, 50);
    setStatus('scanning', 'Vérification en cours…');

    const debut = Date.now();

    chargerMatriculesDepuisSheet()
      .then((matriculesValides) => {
        return chargerMotsDePasseDepuisSheet().then((mdpValides) => [matriculesValides, mdpValides]);
      })
      .then(([matriculesValides, mdpValides]) => {
        const ecoule = Date.now() - debut;
        const attenteRestante = Math.max(0, DUREE_PHASE - ecoule);

        setTimeout(() => {
          const grade = matriculesValides.get(valeur.toLowerCase());
          const trouve = matriculesValides.has(valeur.toLowerCase());
          arreterBarreScan();

          if (trouve) {
            const messageGrade = grade ? ` — Grade : ${grade}` : '';
            setStatus('ok', `Accréditation reconnue, bienvenue ${valeur}${messageGrade}.`);
            setBigStatus('ok', 'Autorisé');
            inputRow.style.display = 'none';

            const necessiteDoubleVerif = MATRICULES_DOUBLE_VERIF.includes(valeur.toLowerCase());
            const mdpAttendu = necessiteDoubleVerif ? mdpValides.get(valeur.toLowerCase()) : null;

            if (mdpAttendu) {
              // Double vérification requise : la barre reste figée à 50%
              setTimeout(() => {
                statusZone.classList.remove('active');
                statusZone.innerHTML = '';
                bigStatus.innerHTML = '';
                contexteEnAttente = { valeur, mdpAttendu, grade };
                mdpRow.style.display = 'flex';
                mdpInput.focus();
                setStatus('scanning', 'Confirmation par mot de passe requise avant l\'accès.');
              }, 1500);
            } else {
              verifyBtn.disabled = false;
              setTimeout(() => {
                statusZone.classList.remove('active');
                statusZone.innerHTML = '';
                bigStatus.innerHTML = '';
                continuerPhase2(valeur, grade);
              }, 1500);
            }
          } else {
            verifyBtn.disabled = false;
            scanBar.style.display = 'none';
            setStatus('fail', 'Accès refusé.');
            setBigStatus('fail', 'Refusé');
          }
        }, attenteRestante);
      })
      .catch((err) => {
        console.error('Erreur de vérification :', err);
        arreterBarreScan();
        scanBar.style.display = 'none';
        verifyBtn.disabled = false;
        setStatus('fail', 'Connexion à la base des accès impossible.');
      });
  }

  function verifierMotDePasse() {
    if (!contexteEnAttente) return;
    const saisie = mdpInput.value; // sensible à la casse

    if (!saisie) {
      setStatus('fail', 'Entrez le mot de passe de vérification.');
      return;
    }

    if (saisie === contexteEnAttente.mdpAttendu) {
      const valeur = contexteEnAttente.valeur;
      const grade = contexteEnAttente.grade;
      mdpRow.style.display = 'none';
      setStatus('ok', 'Mot de passe confirmé, accès complet accordé.');
      setBigStatus('ok', 'Autorisé');
      setTimeout(() => {
        statusZone.classList.remove('active');
        statusZone.innerHTML = '';
        bigStatus.innerHTML = '';
        continuerPhase2(valeur, grade);
      }, 1200);
    } else {
      scanBar.style.display = 'none';
      setStatus('fail', 'Mot de passe incorrect. Accès refusé.');
      setBigStatus('fail', 'Refusé');
    }
  }

  verifyBtn.addEventListener('click', verifier);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') verifier(); });
  mdpVerifyBtn.addEventListener('click', verifierMotDePasse);
  mdpInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') verifierMotDePasse(); });
</script>

</body>
</html>
